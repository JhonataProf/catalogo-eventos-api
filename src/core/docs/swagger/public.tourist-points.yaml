tags:
  - name: Tourist Point PUBLIC
    description: Endpoints públicos de pontos turísticos

paths:
  /public/tourist-points:
    get:
      summary: Lista paginada de pontos turísticos
      tags:
        - Tourist Point PUBLIC
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: state
          schema: { type: string }
        - in: query
          name: published
          schema: { type: string, enum: ["true", "false"] }
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, city, state, createdAt]
        - in: query
          name: sortDir
          schema: { type: string, enum: [asc, desc, ASC, DESC] }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TouristPointsCollectionResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /public/tourist-points/{id}:
    get:
      summary: Busca ponto turístico por ID
      tags:
        - Tourist Point PUBLIC
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TouristPointResourceResponse"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    TouristPointListItemPayload:
      type: object
      description: Item de listagem (timestamps opcionais conforme persistência)
      properties:
        id: { type: integer }
        cityId: { type: integer }
        citySlug: { type: string }
        name: { type: string }
        description: { type: string }
        category: { type: string }
        address: { type: string }
        openingHours: { type: string }
        imageUrl: { type: string }
        featured: { type: boolean }
        published: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TouristPointDetailPayload:
      type: object
      description: Detalhe (sem timestamps de auditoria no contrato atual)
      properties:
        id: { type: integer }
        cityId: { type: integer }
        citySlug: { type: string }
        name: { type: string }
        description: { type: string }
        category: { type: string }
        address: { type: string }
        openingHours: { type: string }
        imageUrl: { type: string }
        featured: { type: boolean }
        published: { type: boolean }

    TouristPointsListMeta:
      allOf:
        - $ref: "#/components/schemas/Meta"
      properties:
        version: { type: string, example: "1.0.0" }
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        sort:
          type: object
          properties:
            by: { type: string }
            dir: { type: string }

    TouristPointsCollectionResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TouristPointListItemPayload"
        links:
          $ref: "#/components/schemas/Links"
        meta:
          $ref: "#/components/schemas/TouristPointsListMeta"

    TouristPointResourceResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          $ref: "#/components/schemas/TouristPointDetailPayload"
        links:
          $ref: "#/components/schemas/Links"
        meta:
          $ref: "#/components/schemas/SimpleListMeta"
