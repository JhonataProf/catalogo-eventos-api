tags:
  - name: Events ADMIN
    description: Endpoints relacionados aos eventos da região

paths:
  /admin/events:
    get:
      summary: Lista paginada de eventos (admin)
      tags:
        - Events ADMIN
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: cityId
          schema: { type: integer, minimum: 1 }
        - in: query
          name: sortBy
          schema: { type: string }
        - in: query
          name: sortDir
          schema: { type: string, enum: [asc, desc], default: asc }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEventsCollectionResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

    post:
      summary: Cria evento
      tags:
        - Events ADMIN
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventWriteRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEventResourceResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"

  /admin/events/{id}:
    get:
      summary: Busca evento por ID
      tags:
        - Events ADMIN
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEventResourceResponse"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"

    patch:
      summary: Atualiza evento
      tags:
        - Events ADMIN
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventWriteRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEventResourceResponse"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"

    delete:
      summary: Remove evento
      tags:
        - Events ADMIN
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Sem corpo; use header x-correlation-id
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"

components:
  schemas:
    EventHttpPayload:
      type: object
      properties:
        id: { type: integer }
        cityId: { type: integer }
        citySlug: { type: string }
        name: { type: string }
        description: { type: string }
        category: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        formattedDate: { type: string }
        location: { type: string }
        imageUrl: { type: string }
        featured: { type: boolean }
        published: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    EventWriteRequest:
      type: object
      description: Corpo de criação/atualização (campos conforme DTO da API)
      properties:
        cityId: { type: integer }
        citySlug: { type: string }
        name: { type: string }
        description: { type: string }
        category: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        formattedDate: { type: string }
        location: { type: string }
        imageUrl: { type: string }
        featured: { type: boolean }
        published: { type: boolean }

    EventsListMeta:
      allOf:
        - $ref: "#/components/schemas/Meta"
      properties:
        version: { type: string, example: "1.0.0" }
        total: { type: integer }
        totalPages: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        sort:
          type: object
          properties:
            by: { type: string }
            dir: { type: string, enum: [asc, desc] }

    AdminEventsCollectionResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EventHttpPayload"
        links:
          $ref: "#/components/schemas/Links"
        meta:
          $ref: "#/components/schemas/EventsListMeta"

    AdminEventResourceResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          $ref: "#/components/schemas/EventHttpPayload"
        links:
          $ref: "#/components/schemas/Links"
        meta:
          $ref: "#/components/schemas/SimpleListMeta"
