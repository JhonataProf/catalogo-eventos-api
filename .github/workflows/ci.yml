name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    env:
      JWT_SECRET: ffffffffffffffffffffffffffffffff
      JWT_ACCESS_SECRET: ffffffffffffffffffffffffffffffff
      JWT_REFRESH_SECRET: ffffffffffffffffffffffffffffffff

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: yarn

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Prettier (check)
        run: yarn format:check

      - name: Lint
        run: yarn lint

      - name: Testes com cobertura
        run: yarn test:ci

      - name: Build e verificação do dist (entrypoint + Swagger)
        run: yarn build && yarn verify:dist

      - name: Smoke HTTP — servidor sobe e /health responde
        env:
          NODE_ENV: test
          SMOKE_PORT: "34581"
        run: yarn smoke:http

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=40s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: yarn

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: yarn install --frozen-lockfile

      - name: Migrations e seeders contra MySQL
        env:
          DB_DIALECT: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_DATABASE: db_app
          DB_USERNAME: root
          DB_PASSWORD: root
          ADMIN_EMAIL: admin@catalogo-eventos.com.br
          ADMIN_PASSWORD: ci_bootstrap_admin_password_not_for_prod
        run: yarn db:bootstrap
